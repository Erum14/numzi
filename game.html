<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Numzi – Games</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --cream:   #FDF6E9;
      --kraft:   #EFE3C8;
      --warm:    #E0CCA8;
      --ink:     #3D2C1E;
      --orange:  #E8844A;
      --yellow:  #F5C842;
      --sage:    #7BBF8E;
      --sky:     #7BBFDB;
      --coral:   #E87B7B;
      --brown:   #9B6B4A;
      --lavender:#B59FD6;
    }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Nunito', sans-serif;
      background: #FEFAF4;
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ─── NAV ─── */
    nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 2.5rem; height: 100px;
      background: var(--cream);
      border-bottom: 3px solid var(--warm);
      position: sticky; top: 0; z-index: 100;
    }
    .logo { line-height: 0; overflow: visible; }
    .nav-links { display: flex; gap: .8rem; align-items: center; }
    .nav-links a {
      font-family: 'Fredoka One', cursive; font-size: 1.05rem;
      color: var(--brown); text-decoration: none;
      padding: .4rem 1rem; border-radius: 10px;
      transition: background .2s, color .2s; white-space: nowrap;
    }
    .nav-links a:hover { background: var(--warm); color: var(--ink); }
    .nav-links a.active { background: var(--orange); color: #fff; box-shadow: 0 3px 0 #b85e28; }
    .nav-links a.vid-link { background: var(--sky); color: #fff; box-shadow: 0 3px 0 #4fa3c7; }
    .nav-links a.vid-link:hover { background: #5aacc7; }

    /* ─── GAME SWITCHER TABS ─── */
    .game-tabs {
      display: flex; gap: .7rem; justify-content: center;
      padding: 1.4rem 1.5rem .2rem; flex-wrap: wrap;
    }
    .game-tab {
      font-family: 'Fredoka One', cursive; font-size: 1.1rem;
      padding: .5rem 1.6rem; border-radius: 50px;
      border: 2.5px solid var(--warm);
      background: var(--cream); color: var(--ink);
      cursor: pointer; transition: all .2s;
    }
    .game-tab:hover { border-color: var(--orange); color: var(--orange); }
    .game-tab.active {
      background: var(--orange); border-color: var(--orange);
      color: #fff; box-shadow: 0 4px 0 #b85e28;
    }
    .game-tab[data-game="clay"].active {
      background: #7BBF5E; border-color: #7BBF5E; box-shadow: 0 4px 0 #4e9e35;
    }
    .game-tab[data-game="clay"]:hover { border-color: #7BBF5E; color: #4e9e35; }
    .game-tab[data-game="animal"].active {
      background: #E87B7B; border-color: #E87B7B; box-shadow: 0 4px 0 #a84040;
    }
    .game-tab[data-game="animal"]:hover { border-color: #E87B7B; color: #a84040; }

    /* ─── SHARED PAGE WRAPPER ─── */
    .game-section { display: none; flex: 1; flex-direction: column; align-items: center; padding: 1.5rem 1.5rem 3rem; gap: 1.5rem; }
    .game-section.active { display: flex; }

    /* ══════════════════════════════════════
       GAME 1 — CHARM COUNTING QUIZ
    ══════════════════════════════════════ */
    .game-title {
      font-family: 'Fredoka One', cursive;
      font-size: clamp(1.5rem, 4vw, 2.2rem);
      color: var(--ink); text-align: center;
    }
    .game-title span { color: var(--orange); }
    .score-bar {
      display: flex; gap: 2rem;
      font-family: 'Fredoka One', cursive; font-size: 1.1rem; color: var(--brown);
    }
    .score-bar span { color: var(--ink); }
    .game-card {
      background: #FEFAF4; border: 3px solid var(--warm);
      border-radius: 24px; box-shadow: 0 8px 32px rgba(61,44,30,.10);
      padding: 2.5rem 2.5rem 2rem; max-width: 580px; width: 100%;
      display: flex; flex-direction: column; align-items: center; gap: 1.8rem;
    }
    .question-label { font-family: 'Fredoka One', cursive; font-size: 1.25rem; color: var(--brown); }
    .items-stage {
      display: flex; flex-wrap: wrap; justify-content: center; align-items: center;
      gap: 1rem; min-height: 130px; padding: .5rem;
    }
    .charm-item {
      width: 100px; height: 100px; object-fit: contain;
      filter: drop-shadow(2px 3px 4px rgba(0,0,0,.18));
      animation: popIn .35s cubic-bezier(.34,1.56,.64,1) both;
    }
    @keyframes popIn {
      from { transform: scale(0) rotate(-10deg); opacity: 0; }
      to   { transform: scale(1) rotate(0deg); opacity: 1; }
    }
    .charm-item:nth-child(2){animation-delay:.07s} .charm-item:nth-child(3){animation-delay:.14s}
    .charm-item:nth-child(4){animation-delay:.21s} .charm-item:nth-child(5){animation-delay:.28s}
    .feedback { font-family:'Fredoka One',cursive; font-size:1.9rem; min-height:2.4rem; text-align:center; }
    .feedback.correct { color: var(--sage); }
    .feedback.wrong   { color: var(--coral); }
    .choices { display:flex; gap:1.2rem; justify-content:center; flex-wrap:wrap; }
    .choice-btn {
      width:120px; height:120px; border:3.5px solid var(--warm); border-radius:20px;
      background:var(--cream); cursor:pointer;
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      transition:transform .15s, box-shadow .15s, border-color .2s;
      box-shadow:0 4px 0 var(--warm); padding:.4rem;
    }
    .choice-btn:hover:not(:disabled) { transform:translateY(-4px); box-shadow:0 8px 0 var(--warm); border-color:var(--orange); }
    .choice-btn:active:not(:disabled) { transform:translateY(2px); box-shadow:0 2px 0 var(--warm); }
    .choice-btn img { width:80px; height:80px; object-fit:contain; }
    .choice-btn .num-label { font-family:'Fredoka One',cursive; font-size:1.5rem; color:var(--ink); }
    .choice-btn.correct-ans { border-color:var(--sage); background:#E8F7EE; animation:correctPop .5s cubic-bezier(.34,1.56,.64,1); }
    .choice-btn.wrong-ans   { border-color:var(--coral); background:#FDE8E8; animation:shake .4s ease; }
    @keyframes correctPop { 0%{transform:scale(1)} 40%{transform:scale(1.18) rotate(5deg)} 70%{transform:scale(.95) rotate(-3deg)} 100%{transform:scale(1) rotate(0)} }
    @keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-8px)} 40%{transform:translateX(8px)} 60%{transform:translateX(-6px)} 80%{transform:translateX(6px)} }
    .choice-btn:disabled { cursor:default; }
    .btn-row { display:flex; gap:1rem; justify-content:center; }
    .new-game-btn {
      font-family:'Fredoka One',cursive; font-size:1.2rem;
      background:var(--orange); color:#fff; border:none;
      border-radius:14px; padding:.75rem 2.2rem; cursor:pointer;
      box-shadow:0 4px 0 #b85e28; transition:transform .15s, box-shadow .15s;
    }
    .new-game-btn:hover { transform:translateY(-3px); box-shadow:0 7px 0 #b85e28; }
    .new-game-btn:active { transform:translateY(2px); box-shadow:0 2px 0 #b85e28; }
    .stars { font-size:1.5rem; letter-spacing:.2rem; min-height:1.8rem; }

    /* ══════════════════════════════════════
       GAME 2 — CLAY COUNTING
    ══════════════════════════════════════ */
    .clay-wrap {
      display: flex; flex-direction: column; align-items: center;
      gap: 1.2rem; width: 100%; max-width: 660px;
    }
    .clay-title {
      font-family: 'Fredoka One', cursive;
      font-size: clamp(1.6rem, 4vw, 2.2rem);
      color: var(--ink); text-align: center;
    }
    .clay-title em { font-style: italic; color: #7BBF5E; }

    /* Big number display */
    .clay-num-display {
      display: flex; flex-direction: column; align-items: center; gap: .1rem;
      min-height: 110px;
    }
    .clay-digit {
      font-family: 'Fredoka One', cursive;
      font-size: clamp(4rem, 12vw, 6rem);
      color: #7BBF5E; line-height: 1;
      transition: transform .3s cubic-bezier(.34,1.56,.64,1);
    }
    .clay-digit.bump { animation: numBump .35s cubic-bezier(.34,1.56,.64,1); }
    @keyframes numBump { 0%{transform:scale(1)} 50%{transform:scale(1.25)} 100%{transform:scale(1)} }
    .clay-word {
      font-family: 'Fredoka One', cursive; font-style: italic;
      font-size: clamp(1.2rem, 3vw, 1.7rem); color: #7BBF5E;
      min-height: 1.8rem;
    }

    /* Hint text */
    .clay-hint { font-size: .9rem; color: var(--brown); font-weight: 700; }

    /* Clay board */
    .clay-board {
      width: 100%; min-height: 130px;
      background: #F5EEE0;
      border: 3px solid var(--warm); border-radius: 18px;
      box-shadow: inset 0 3px 10px rgba(61,44,30,.08);
      display: flex; flex-wrap: wrap;
      align-items: center; justify-content: center;
      gap: .9rem; padding: 1.1rem 1.2rem;
      position: relative;
      overflow: visible;
    }
    .board-label {
      position: absolute; top: -14px; left: 16px;
      font-family: 'Fredoka One', cursive; font-size: .8rem;
      background: var(--warm); color: var(--ink);
      padding: .1rem .75rem; border-radius: 99px;
      border: 2px solid var(--warm);
    }

    /* Clay ball */
    .clay-ball {
      width: 62px; height: 62px; border-radius: 50%;
      cursor: pointer; flex-shrink: 0;
      box-shadow: inset -5px -5px 10px rgba(0,0,0,.25),
                  inset 3px 3px 8px rgba(255,255,255,.35),
                  3px 6px 12px rgba(0,0,0,.28);
      transition: transform .15s;
      animation: ballPop .35s cubic-bezier(.34,1.56,.64,1) both;
      position: relative;
    }
    .clay-ball::after {
      content: '';
      position: absolute;
      top: 14%; left: 20%;
      width: 28%; height: 20%;
      background: rgba(255,255,255,.45);
      border-radius: 50%;
      transform: rotate(-30deg);
    }
    @keyframes ballPop {
      from { transform: scale(0); opacity: 0; }
      to   { transform: scale(1); opacity: 1; }
    }
    .clay-ball:hover { transform: scale(1.1); }
    .clay-ball:active { transform: scale(.9); }
    .clay-ball.wiggle { animation: ballWiggle .55s ease; }
    @keyframes ballWiggle {
      0%{transform:rotate(0) scale(1)}
      20%{transform:rotate(-18deg) scale(1.15)}
      40%{transform:rotate(16deg) scale(1.1)}
      60%{transform:rotate(-12deg) scale(1.05)}
      80%{transform:rotate(8deg) scale(1.02)}
      100%{transform:rotate(0) scale(1)}
    }
    .clay-ball.squish {
      animation: squishOut .3s cubic-bezier(.55,.06,.68,.19) forwards;
    }
    @keyframes squishOut {
      0%  { transform: scale(1); opacity: 1; }
      40% { transform: scale(1.35,.6); opacity: .8; }
      100%{ transform: scale(0); opacity: 0; }
    }

    /* Color picker */
    .color-picker { display: flex; gap: .7rem; flex-wrap: wrap; justify-content: center; }
    .color-dot {
      width: 44px; height: 44px; border-radius: 50%;
      border: 3px solid transparent;
      cursor: pointer;
      box-shadow: inset -3px -3px 6px rgba(0,0,0,.25),
                  inset 2px 2px 5px rgba(255,255,255,.3),
                  2px 4px 8px rgba(0,0,0,.22);
      transition: transform .15s, border-color .15s;
    }
    .color-dot:hover { transform: scale(1.18); }
    .color-dot.selected { border-color: var(--ink); transform: scale(1.2); }

    /* Action buttons */
    .clay-controls { display: flex; gap: .7rem; flex-wrap: wrap; justify-content: center; }
    .clay-btn {
      font-family: 'Fredoka One', cursive; font-size: 1.1rem;
      border: 2.5px solid var(--ink); border-radius: 12px;
      padding: .55rem 1.4rem; cursor: pointer;
      transition: transform .15s, box-shadow .15s;
      background: var(--cream); color: var(--ink);
      box-shadow: 0 4px 0 rgba(61,44,30,.35);
    }
    .clay-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 0 rgba(61,44,30,.3); }
    .clay-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 rgba(61,44,30,.3); }
    .clay-btn.add-btn  { background: #7BBF5E; color: #fff; border-color: #4e9e35; box-shadow: 0 4px 0 #3a7a22; }
    .clay-btn.add-btn:hover  { box-shadow: 0 6px 0 #3a7a22; }
    .clay-btn.count-btn { background: var(--orange); color: #fff; border-color: #b85e28; box-shadow: 0 4px 0 #8a3f18; }
    .clay-btn.count-btn:hover { box-shadow: 0 6px 0 #8a3f18; }
    .clay-btn.clear-btn { background: #e8e0d4; color: var(--brown); }

    /* ══ ANIMAL FREEZE DETECTIVE ══ */
    .animal-wrap { display:flex; flex-direction:column; align-items:center; gap:1.1rem; width:100%; max-width:640px; }
    .animal-title { font-family:'Fredoka One',cursive; font-size:clamp(1.5rem,4vw,2.1rem); color:var(--ink); text-align:center; }
    .animal-title em { font-style:italic; color:#E87B7B; }

    .round-badge {
      font-family:'Fredoka One',cursive; font-size:.85rem;
      padding:.3rem 1.1rem; border-radius:50px;
      display:inline-block; letter-spacing:.04em;
    }
    .badge-sound    { background:#7BBFDB; color:#fff; }
    .badge-category { background:#B59FD6; color:#fff; }
    .badge-beanimal { background:#E8844A; color:#fff; }

    .animal-question {
      font-family:'Fredoka One',cursive;
      font-size:clamp(1.2rem,3.5vw,1.6rem);
      color:var(--ink); text-align:center; line-height:1.3;
      min-height:2rem;
    }

    /* Clue pills revealed one by one */
    .clue-row { display:flex; flex-wrap:wrap; gap:.6rem; justify-content:center; min-height:2.2rem; }
    .clue-pill {
      font-family:'Fredoka One',cursive; font-size:1rem;
      background:var(--yellow); color:var(--ink);
      padding:.3rem 1rem; border-radius:99px;
      border:2px solid rgba(61,44,30,.15);
      animation:pillPop .35s cubic-bezier(.34,1.56,.64,1) both;
    }
    @keyframes pillPop { from{transform:scale(0);opacity:0} to{transform:scale(1);opacity:1} }

    /* Big animal display (be-the-animal mode) */
    .animal-big {
      font-size:clamp(5rem,18vw,8rem); line-height:1;
      animation:popIn .4s cubic-bezier(.34,1.56,.64,1);
      filter:drop-shadow(0 6px 16px rgba(0,0,0,.18));
    }
    .animal-big-img { width:140px; height:140px; object-fit:contain;
      animation:popIn .4s cubic-bezier(.34,1.56,.64,1);
      filter:drop-shadow(0 6px 16px rgba(0,0,0,.2)); }
    .be-instruction {
      font-family:'Fredoka One',cursive; font-size:1.3rem;
      color:var(--orange); text-align:center; line-height:1.4;
    }

    /* Choice buttons for animal game */
    .animal-choices { display:flex; gap:1rem; flex-wrap:wrap; justify-content:center; }
    .animal-choice-btn {
      width:130px; min-height:140px;
      border:3.5px solid var(--warm); border-radius:20px;
      background:var(--cream); cursor:pointer;
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      gap:.4rem; padding:.6rem .4rem;
      transition:transform .15s, box-shadow .15s, border-color .2s;
      box-shadow:0 4px 0 var(--warm);
    }
    .animal-choice-btn:hover:not(:disabled) { transform:translateY(-4px); box-shadow:0 8px 0 var(--warm); border-color:var(--coral); }
    .animal-choice-btn:active:not(:disabled) { transform:translateY(2px); box-shadow:0 2px 0 var(--warm); }
    .animal-choice-btn .a-emoji { font-size:3.2rem; line-height:1; }
    .animal-choice-btn img { width:80px; height:80px; object-fit:contain; }
    .animal-choice-btn .a-name { font-family:'Fredoka One',cursive; font-size:.95rem; color:var(--ink); }
    .animal-choice-btn.a-correct { border-color:var(--sage); background:#E8F7EE; animation:correctPop .5s cubic-bezier(.34,1.56,.64,1); }
    .animal-choice-btn.a-wrong   { border-color:var(--coral); background:#FDE8E8; animation:shake .4s ease; }
    .animal-choice-btn:disabled  { cursor:default; }

    /* Reveal area (shows animal after guess) */
    .animal-reveal { display:flex; flex-direction:column; align-items:center; gap:.4rem; }
    .reveal-label { font-family:'Fredoka One',cursive; font-size:1.1rem; color:var(--brown); }

    .animal-feedback { font-family:'Fredoka One',cursive; font-size:1.8rem; min-height:2.2rem; text-align:center; }
    .animal-feedback.correct { color:var(--sage); }
    .animal-feedback.wrong   { color:var(--coral); }
    .animal-feedback.action  { color:var(--orange); }

    .did-it-btn {
      font-family:'Fredoka One',cursive; font-size:1.3rem;
      background:#E87B7B; color:#fff; border:none;
      border-radius:14px; padding:.8rem 2.5rem; cursor:pointer;
      box-shadow:0 4px 0 #a84040; transition:transform .15s, box-shadow .15s;
      animation:correctPop .5s cubic-bezier(.34,1.56,.64,1);
    }
    .did-it-btn:hover { transform:translateY(-3px); box-shadow:0 7px 0 #a84040; }
    .did-it-btn:active { transform:translateY(2px); box-shadow:0 2px 0 #a84040; }

    /* ─── CONFETTI ─── */
    .confetti-wrap { position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:999; overflow:hidden; }
    .confetti-dot { position:absolute; border-radius:50%; animation:fall linear forwards; }
    @keyframes fall { 0%{transform:translateY(-20px) rotate(0deg);opacity:1} 100%{transform:translateY(105vh) rotate(720deg);opacity:0} }

    /* ─── RESPONSIVE ─── */
    @media (max-width: 520px) {
      nav { padding: 0 1rem; }
      .game-card { padding: 1.5rem 1rem; }
      .choice-btn { width: 95px; height: 95px; }
      .choice-btn img { width: 62px; height: 62px; }
      .charm-item { width: 78px; height: 78px; }
      .clay-ball { width: 52px; height: 52px; }
    }
  </style>
</head>
<body>

<!-- ─── NAV ─── -->
<nav>
  <div class="logo">
    <a href="index.html"><img src="assets/logo.png" alt="Numzi" height="110" style="display:block;filter:drop-shadow(1px 1px 2px rgba(0,0,0,.1))"/></a>
  </div>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="game.html" class="active">🎮 Games</a>
    <a href="videos.html" class="vid-link">📺 Videos</a>
  </div>
</nav>

<!-- ─── CONFETTI ─── -->
<div class="confetti-wrap" id="confettiWrap"></div>

<!-- ─── GAME SWITCHER ─── -->
<div class="game-tabs">
  <button class="game-tab active" data-game="quiz"   onclick="switchGame('quiz')">🔢 Charm Counting Quiz</button>
  <button class="game-tab"        data-game="clay"   onclick="switchGame('clay')">🎨 Clay Counting</button>
  <button class="game-tab"        data-game="animal" onclick="switchGame('animal')">🕵️ Animal Freeze Detective</button>
</div>

<!-- ════════════════════════════════════════
     SECTION 1 — CHARM COUNTING QUIZ
════════════════════════════════════════ -->
<section class="game-section active" id="sec-quiz">
  <div class="game-title">How many <span>charms</span> do you see? 🔢</div>
  <div class="score-bar">
    <div>⭐ Score: <span id="scoreVal">0</span></div>
    <div>🎯 Round: <span id="roundVal">1</span></div>
  </div>
  <div class="game-card">
    <div class="question-label">Count the charms!</div>
    <div class="items-stage" id="itemsStage"></div>
    <div class="feedback" id="feedback"></div>
    <div class="choices"   id="choices"></div>
    <div class="stars"     id="stars"></div>
    <div class="btn-row">
      <button class="new-game-btn" id="nextBtn" onclick="nextRound()">Next ➜</button>
    </div>
  </div>
</section>

<!-- ════════════════════════════════════════
     SECTION 2 — CLAY COUNTING
════════════════════════════════════════ -->
<section class="game-section" id="sec-clay">
  <div class="clay-wrap">
    <div class="clay-title">🎨 <em>Clay Counting!</em></div>

    <!-- Number display -->
    <div class="clay-num-display">
      <div class="clay-digit" id="clayDigit">0</div>
      <div class="clay-word"  id="clayWord"></div>
    </div>

    <div class="clay-hint">Tap a ball to squish it!</div>

    <!-- Board -->
    <div class="clay-board" id="clayBoard">
      <div class="board-label">🖐 My Clay Board</div>
    </div>

    <!-- Color picker -->
    <div class="color-picker" id="colorPicker"></div>

    <!-- Controls -->
    <div class="clay-controls">
      <button class="clay-btn" onclick="clayRemove()">– </button>
      <button class="clay-btn add-btn" onclick="clayAdd()">+</button>
      <button class="clay-btn count-btn" onclick="clayCount()">Count! 🔢</button>
      <button class="clay-btn clear-btn" onclick="clayClear()">Clear 🗑️</button>
    </div>
  </div>
</section>

<!-- ════════════════════════════════════════
     SECTION 3 — ANIMAL FREEZE DETECTIVE
════════════════════════════════════════ -->
<section class="game-section" id="sec-animal">
  <div class="animal-wrap">
    <div class="animal-title">🕵️ <em>Animal Freeze Detective!</em></div>

    <div class="score-bar">
      <div>🦁 Score: <span id="aScoreVal">0</span></div>
      <div>🎯 Round: <span id="aRoundVal">1</span></div>
    </div>

    <!-- Mode badge -->
    <div class="round-badge badge-sound" id="roundBadge">🎵 Sound Detective</div>

    <!-- Question -->
    <div class="animal-question" id="animalQuestion">Listen to the sound and find the animal!</div>

    <!-- Clue pills row -->
    <div class="clue-row" id="clueRow"></div>

    <!-- Big animal (be-the-animal mode) -->

<script>
/* ════════════════════════════════════
   SHARED HELPERS
════════════════════════════════════ */
function rand(min,max){ return Math.floor(Math.random()*(max-min+1))+min; }
function pick(arr){ return arr[Math.floor(Math.random()*arr.length)]; }
const CONFETTI_COLORS = ['#E8844A','#F5C842','#7BBF8E','#7BBFDB','#B59FD6','#E87B7B','#7BBF5E'];

function speak(text, rate=0.88, pitch=1.25) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.rate=rate; u.pitch=pitch; u.volume=1;
  window.speechSynthesis.speak(u);
}

function launchConfetti() {
  const wrap = document.getElementById('confettiWrap');
  for (let i=0;i<60;i++) {
    const d = document.createElement('div');
    d.className='confetti-dot';
    d.style.left=rand(0,100)+'vw';
    d.style.background=pick(CONFETTI_COLORS);
    d.style.width=rand(7,14)+'px'; d.style.height=rand(7,14)+'px';
    d.style.borderRadius=Math.random()>.5?'50%':'3px';
    const dur=rand(900,1600);
    d.style.animationDuration=dur+'ms'; d.style.animationDelay=rand(0,300)+'ms';
    wrap.appendChild(d);
    setTimeout(()=>d.remove(), dur+400);
  }
}

/* ─── Tab switcher ─── */
function switchGame(name) {
  document.querySelectorAll('.game-tab').forEach(t=>t.classList.toggle('active', t.dataset.game===name));
  document.querySelectorAll('.game-section').forEach(s=>s.classList.toggle('active', s.id==='sec-'+name));
  location.hash = name;
}

/* ════════════════════════════════════
   GAME 1 — CHARM COUNTING QUIZ
════════════════════════════════════ */
const CHARMS = [
  {src:'assets/charms/cat.png',        name:'cat'},
  {src:'assets/charms/ladybug.png',    name:'ladybug'},
  {src:'assets/charms/sun.png',        name:'sun'},
  {src:'assets/charms/flower.png',     name:'flower'},
  {src:'assets/charms/mushroom.png',   name:'mushroom'},
  {src:'assets/charms/rainbow.png',    name:'rainbow'},
  {src:'assets/charms/frog.png',       name:'frog'},
  {src:'assets/charms/penguin.png',    name:'penguin'},
  {src:'assets/charms/egg.png',        name:'egg'},
  {src:'assets/charms/melon.png',      name:'melon'},
  {src:'assets/charms/gingerbread.png',name:'gingerbread'},
];
const NUM_IMGS={1:'assets/one.png',2:'assets/two.png',3:'assets/three.png',4:'assets/four.png'};
let correctAnswer=1, score=0, round=1, answered=false;

function buildRound() {
  answered=false;
  document.getElementById('feedback').textContent='';
  document.getElementById('feedback').className='feedback';
  document.getElementById('stars').textContent='';
  document.getElementById('nextBtn').textContent='Skip ➜';
  const charm=pick(CHARMS);
  correctAnswer=rand(1,5);
  const stage=document.getElementById('itemsStage');
  stage.innerHTML='';
  for(let i=0;i<correctAnswer;i++){
    const img=document.createElement('img');
    img.src=charm.src; img.alt=charm.name; img.className='charm-item';
    img.style.animationDelay=(i*.08)+'s';
    stage.appendChild(img);
  }
  const opts=new Set([correctAnswer]);
  while(opts.size<3){ let n=rand(1,5); if(n!==correctAnswer) opts.add(n); }
  const shuffled=[...opts].sort(()=>Math.random()-.5);
  const choicesEl=document.getElementById('choices');
  choicesEl.innerHTML='';
  shuffled.forEach(num=>{
    const btn=document.createElement('button');
    btn.className='choice-btn'; btn.dataset.val=num;
    btn.onclick=()=>handleAnswer(num,btn);
    if(NUM_IMGS[num]){
      const img=document.createElement('img'); img.src=NUM_IMGS[num]; img.alt=num; btn.appendChild(img);
    } else {
      const lbl=document.createElement('div'); lbl.className='num-label'; lbl.textContent=num; btn.appendChild(lbl);
    }
    choicesEl.appendChild(btn);
  });
}

function handleAnswer(val,btn) {
  if(answered) return;
  answered=true;
  document.querySelectorAll('.choice-btn').forEach(b=>b.disabled=true);
  if(val===correctAnswer){
    btn.classList.add('correct-ans'); score++;
    document.getElementById('scoreVal').textContent=score;
    document.getElementById('feedback').textContent='🌟 Good Job!';
    document.getElementById('feedback').className='feedback correct';
    document.getElementById('stars').textContent='⭐'.repeat(Math.min(score,5));
    speak('Good job! You counted '+correctAnswer+'!');
    launchConfetti();
  } else {
    btn.classList.add('wrong-ans');
    document.querySelectorAll('.choice-btn').forEach(b=>{ if(parseInt(b.dataset.val)===correctAnswer) b.classList.add('correct-ans'); });
    document.getElementById('feedback').textContent='💛 Try Again!';
    document.getElementById('feedback').className='feedback wrong';
    speak('Try again! The answer was '+correctAnswer+'.');
  }
  document.getElementById('nextBtn').textContent='Next ➜';
  round++; document.getElementById('roundVal').textContent=round;
}

function nextRound(){ buildRound(); }

/* ════════════════════════════════════
   GAME 2 — CLAY COUNTING
════════════════════════════════════ */
const CLAY_COLORS = [
  { name:'red',    light:'#ff8a82', mid:'#E8524A', dark:'#a82820' },
  { name:'orange', light:'#ffb87a', mid:'#E89045', dark:'#a85e20' },
  { name:'yellow', light:'#ffe083', mid:'#F5C842', dark:'#b0880a' },
  { name:'green',  light:'#92e594', mid:'#5BBF5E', dark:'#2e8030' },
  { name:'blue',   light:'#90c5f0', mid:'#5A9BD6', dark:'#2a65a0' },
  { name:'purple', light:'#c8b0f0', mid:'#9B7FD6', dark:'#5e3fa8' },
  { name:'pink',   light:'#ffacc7', mid:'#E87BA0', dark:'#a83060' },
];
const NUM_WORDS = ['','One','Two','Three','Four','Five','Six','Seven','Eight','Nine','Ten'];

let clayColor    = CLAY_COLORS[0];
let clayBalls    = [];      // array of color objects
let isCounting   = false;
let addLocked    = false;   // true while the number audio is still speaking

/* Build color picker */
(function initColorPicker(){
  const picker = document.getElementById('colorPicker');
  CLAY_COLORS.forEach((c, i) => {
    const dot = document.createElement('div');
    dot.className = 'color-dot' + (i===0?' selected':'');
    dot.style.background = `radial-gradient(circle at 35% 35%, ${c.light}, ${c.mid} 55%, ${c.dark})`;
    dot.title = c.name;
    dot.onclick = () => {
      document.querySelectorAll('.color-dot').forEach(d=>d.classList.remove('selected'));
      dot.classList.add('selected');
      clayColor = c;
    };
    picker.appendChild(dot);
  });
})();

function clayUpdateDisplay() {
  const n = clayBalls.length;
  const digitEl = document.getElementById('clayDigit');
  digitEl.textContent = n;
  digitEl.classList.remove('bump');
  void digitEl.offsetWidth; // reflow
  digitEl.classList.add('bump');
  document.getElementById('clayWord').textContent = n > 0 && n <= 10 ? NUM_WORDS[n] : (n > 10 ? n : '');
}

function makeBallEl(c) {
  const ball = document.createElement('div');
  ball.className = 'clay-ball';
  ball.style.background = `radial-gradient(circle at 35% 35%, ${c.light}, ${c.mid} 55%, ${c.dark})`;
  ball.onclick = () => claySquish(ball);
  return ball;
}

function clayAdd() {
  if (isCounting || addLocked) return;

  const c = clayColor;
  clayBalls.push(c);
  const board = document.getElementById('clayBoard');
  const ball = makeBallEl(c);
  board.appendChild(ball);
  clayUpdateDisplay();

  // Lock the + button while the number is spoken
  addLocked = true;
  const addBtn = document.querySelector('.clay-btn.add-btn');
  if (addBtn) { addBtn.disabled = true; addBtn.style.opacity = '0.45'; }

  if (!window.speechSynthesis) { unlock(); return; }
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(String(clayBalls.length));
  u.rate = 0.85; u.pitch = 1.4; u.volume = 1;
  u.onend = unlock;
  u.onerror = unlock;
  window.speechSynthesis.speak(u);

  // Fallback: if onend never fires (some browsers), unlock after 2.5 s max
  setTimeout(unlock, 2500);

  function unlock() {
    if (!addLocked) return;
    addLocked = false;
    if (addBtn) { addBtn.disabled = false; addBtn.style.opacity = ''; }
  }
}

function clayRemove() {
  if (isCounting || clayBalls.length === 0) return;
  clayBalls.pop();
  const board = document.getElementById('clayBoard');
  const balls = board.querySelectorAll('.clay-ball');
  const last = balls[balls.length - 1];
  if (last) {
    last.classList.add('squish');
    setTimeout(() => last.remove(), 300);
  }
  clayUpdateDisplay();
}

function claySquish(ball) {
  if (isCounting) return;
  const board = document.getElementById('clayBoard');
  const balls = [...board.querySelectorAll('.clay-ball')];
  const idx = balls.indexOf(ball);
  if (idx !== -1) {
    clayBalls.splice(idx, 1);
    ball.classList.add('squish');
    setTimeout(() => ball.remove(), 300);
    clayUpdateDisplay();
    speak('Pop!', 1.2, 1.4);
  }
}

function clayClear() {
  if (isCounting) return;
  clayBalls = [];
  const board = document.getElementById('clayBoard');
  const balls = board.querySelectorAll('.clay-ball');
  balls.forEach((b, i) => {
    setTimeout(() => { b.classList.add('squish'); setTimeout(()=>b.remove(),300); }, i * 60);
  });
  setTimeout(clayUpdateDisplay, balls.length * 60 + 320);
}

function clayCount() {
  if (isCounting || clayBalls.length === 0) return;
  isCounting = true;
  const board = document.getElementById('clayBoard');
  const balls = [...board.querySelectorAll('.clay-ball')];
  let i = 0;
  function next() {
    if (i >= balls.length) {
      // Final announcement
      setTimeout(() => {
        speak('There are ' + balls.length + '! ' + (NUM_WORDS[balls.length] || balls.length) + '!', 0.82, 1.25);
        launchConfetti();
        isCounting = false;
      }, 300);
      return;
    }
    const ball = balls[i];
    ball.classList.remove('wiggle');
    void ball.offsetWidth;
    ball.classList.add('wiggle');
    speak(String(i + 1), 0.9, 1.3);
    i++;
    setTimeout(next, 700);
  }
  next();
}

let aScore=0, aRound=1, aAnswered=false, aCurrentRoundType='sound';

function animalEl(a) {
  // Returns a DOM element for an animal (image or emoji)
  if (a.img) {
    const img=document.createElement('img');
    img.src=a.img; img.alt=a.name; img.className='animal-big-img';
    return img;
  }
  const span=document.createElement('div');
  span.className='animal-big'; span.textContent=a.emoji;
  return span;

function animalChoiceEl(a, onClick) {
  const btn=document.createElement('button');
  btn.className='animal-choice-btn';
  if (a.img) {
    const img=document.createElement('img'); img.src=a.img; img.alt=a.name; btn.appendChild(img);
  } else {
    const em=document.createElement('div'); em.className='a-emoji'; em.textContent=a.emoji; btn.appendChild(em);
  }
  const nm=document.createElement('div'); nm.className='a-name'; nm.textContent=a.name; btn.appendChild(nm);

  return btn;
}

function pickWrongAnimals(correct, count) {
  const pool=ANIMALS.filter(a=>a.name!==correct.name);
  const out=[];
  while(out.length<count && pool.length) {
    const i=rand(0,pool.length-1);
    out.push(pool.splice(i,1)[0]);
  }
  return out;
}

function shuffle(arr){ return arr.slice().sort(()=>Math.random()-.5); }

/* ── Sound Detective Round ── */
function buildSoundRound() {
  aCurrentRoundType='sound';
  aAnswered=false;
  document.getElementById('roundBadge').className='round-badge badge-sound';
  document.getElementById('roundBadge').textContent='🎵 Sound Detective';
  document.getElementById('clueRow').innerHTML='';
  document.getElementById('animalReveal').style.display='none';
  document.getElementById('didItWrap').style.display='none';
  document.getElementById('animalFeedback').textContent='';
  document.getElementById('animalFeedback').className='animal-feedback';
  document.getElementById('animalNextBtn').textContent='Skip ➜';

  const correct=pick(ANIMALS);
  document.getElementById('animalQuestion').textContent='🎵 Listen… what animal makes this sound?';

  // Speak the sound after short delay
  setTimeout(()=>speak(correct.sound, 0.85, 1.2), 400);

  // Show clue pill after speaking
  setTimeout(()=>{
    const pill=document.createElement('div');
    pill.className='clue-pill';
    pill.textContent='"' + correct.sound + '"';
    document.getElementById('clueRow').appendChild(pill);
  }, 600);

  // Build choices
  const choices=shuffle([correct, ...pickWrongAnimals(correct,2)]);
  const choicesEl=document.getElementById('animalChoices');
  choicesEl.innerHTML='';
  choices.forEach(a=>{
    choicesEl.appendChild(animalChoiceEl(a, (picked,btn)=>handleSoundAnswer(picked,btn,correct)));
  });
}

function handleSoundAnswer(picked, btn, correct) {
  if(aAnswered) return;
  aAnswered=true;
  document.querySelectorAll('.animal-choice-btn').forEach(b=>b.disabled=true);
  if(picked.name===correct.name) {
    btn.classList.add('a-correct');
    aScore++; document.getElementById('aScoreVal').textContent=aScore;
    document.getElementById('animalFeedback').textContent='🌟 Yes! It\'s a '+correct.name+'!';
    document.getElementById('animalFeedback').className='animal-feedback correct';
    speak('Yes! It\'s a '+correct.name+'! Great detective work!', 0.85, 1.25);
    launchConfetti();
    // Show "now be the animal" prompt
    setTimeout(()=>{
      document.getElementById('animalFeedback').textContent='Now YOU be the '+correct.name+'!';
      document.getElementById('animalFeedback').className='animal-feedback action';
      const action=BE_ACTIONS[correct.moves[0]] || 'Move like a '+correct.name+'!';
      const rev=document.getElementById('animalReveal');
      rev.innerHTML='';
      rev.appendChild(animalEl(correct));
      const instr=document.createElement('div');
      instr.className='be-instruction'; instr.textContent=action;
      rev.appendChild(instr);
      rev.style.display='flex'; rev.style.flexDirection='column'; rev.style.alignItems='center'; rev.style.gap='.5rem';
      document.getElementById('didItWrap').style.display='block';
      speak(action, 0.82, 1.2);
    }, 1400);
  } else {
    btn.classList.add('a-wrong');
    document.querySelectorAll('.animal-choice-btn').forEach(b=>{ if(b.querySelector('.a-name')?.textContent===correct.name) b.classList.add('a-correct'); });

    document.getElementById('animalFeedback').className='animal-feedback wrong';
    speak('Oops! That was the '+correct.name+'! '+correct.sound, 0.85, 1.2);
  }
  aRound++; document.getElementById('aRoundVal').textContent=aRound;
  document.getElementById('animalNextBtn').textContent='Next ➜';
}

function animalDidIt(){
  aScore++; document.getElementById('aScoreVal').textContent=aScore;
  document.getElementById('animalFeedback').textContent='🎉 Amazing! You\'re a great '+
    (document.getElementById('animalQuestion').textContent.replace('You ARE the ','').replace('!',''))+' !';
  document.getElementById('animalFeedback').className='animal-feedback correct';
  document.getElementById('didItWrap').style.display='none';
  document.getElementById('animalNextBtn').textContent='Next ➜';
  speak('Amazing job! You\'re a star!', 0.85, 1.3);
  launchConfetti();
  aRound++; document.getElementById('aRoundVal').textContent=aRound;
}

/* ── Weighted next round ── */
function animalNext(){
  const r=Math.random();
  if(r<0.45)      buildSoundRound();
  else if(r<0.80) buildCategoryRound();
  else            buildBeAnimalRound();
}

/* ─── INIT ─── */
buildRound();
buildSoundRound();   // pre-load animal game (hidden)

// Restore tab from URL hash on load
(function() {
  const hash = location.hash.replace('#', '');
  if (hash === 'clay')   switchGame('clay');
  if (hash === 'animal') switchGame('animal');
})();

/* ════════════════════════════════════
   KEYBOARD CONTROLS
   Clay Counting (active when sec-clay visible):
     +  / = / →      → Add ball
     -  / Backspace / ← → Remove ball
     Enter / Space   → Count!
     Escape          → Clear
     1–7             → Pick color
   Quiz (active when sec-quiz visible):
     → / Space       → Next round
════════════════════════════════════ */
document.addEventListener('keydown', e => {
  // Don't fire when typing in an input
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  // Blur any focused button so it doesn't also fire its own click on Enter/Space
  if (document.activeElement && document.activeElement.tagName === 'BUTTON') {
    document.activeElement.blur();
  }

  const clayActive = document.getElementById('sec-clay').classList.contains('active');
  const quizActive = document.getElementById('sec-quiz').classList.contains('active');

  if (clayActive) {
    switch (e.key) {
      case '+':
      case '=':
      case 'ArrowRight':
        e.preventDefault(); clayAdd(); break;

      case '-':
      case '_':
      case 'Backspace':
      case 'ArrowLeft':
        e.preventDefault(); clayRemove(); break;

      case 'Enter':
        e.preventDefault(); clayClear(); break;

      case ' ':
        e.preventDefault(); clayCount(); break;

      case 'Escape':
        e.preventDefault(); clayClear(); break;

      case 'ArrowUp':
      case 'ArrowDown': {
        e.preventDefault();
        const dots = [...document.querySelectorAll('.color-dot')];
        const cur = dots.findIndex(d => d.classList.contains('selected'));
        const next = (cur + (e.key === 'ArrowUp' ? 1 : -1) + dots.length) % dots.length;
        dots[next].click();
        break;
      }

      case '1': case '2': case '3': case '4':
      case '5': case '6': case '7': {
        const idx = parseInt(e.key) - 1;
        const dots = document.querySelectorAll('.color-dot');
        if (dots[idx]) { dots[idx].click(); }
        break;
      }
    }
    return;
  }

  if (quizActive) {
    if (e.key === 'ArrowRight' || e.key === ' ') {
      e.preventDefault();
      nextRound();
    }
  }
});

/* ─── Show keyboard hint on clay tab ─── */
(function addKeyHint() {
  const wrap = document.querySelector('.clay-wrap');
  if (!wrap) return;
  const hint = document.createElement('div');
  hint.style.cssText = 'font-size:.78rem;color:var(--brown);text-align:center;opacity:.7;font-weight:700;margin-top:-.4rem';
  hint.innerHTML = '⌨️ Keys: <kbd style="background:var(--warm);padding:.1rem .4rem;border-radius:5px;font-family:monospace">+</kbd> add &nbsp; <kbd style="background:var(--warm);padding:.1rem .4rem;border-radius:5px;font-family:monospace">-</kbd> remove &nbsp; <kbd style="background:var(--warm);padding:.1rem .4rem;border-radius:5px;font-family:monospace">Space</kbd> count &nbsp; <kbd style="background:var(--warm);padding:.1rem .4rem;border-radius:5px;font-family:monospace">Enter</kbd> clear &nbsp; <kbd style="background:var(--warm);padding:.1rem .4rem;border-radius:5px;font-family:monospace">↑↓</kbd> color &nbsp; <kbd style="background:var(--warm);padding:.1rem .4rem;border-radius:5px;font-family:monospace">1–7</kbd> color';
  wrap.appendChild(hint);
})();
</script>
