<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Numzi – Counting Game</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --cream:   #FDF6E9;
      --kraft:   #EFE3C8;
      --warm:    #E0CCA8;
      --ink:     #3D2C1E;
      --orange:  #E8844A;
      --yellow:  #F5C842;
      --sage:    #7BBF8E;
      --sky:     #7BBFDB;
      --coral:   #E87B7B;
      --brown:   #9B6B4A;
    }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Nunito', sans-serif;
      background: #FEFAF4;
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ─── NAV ─── */
    nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 2.5rem;
      height: 100px;
      background: var(--cream);
      border-bottom: 3px solid var(--warm);
      position: sticky; top: 0; z-index: 100;
    }
    .logo { line-height: 0; overflow: visible; }
    .nav-links { display: flex; gap: 1.5rem; align-items: center; }
    .nav-links a {
      font-family: 'Fredoka One', cursive;
      font-size: 1.1rem;
      color: var(--brown);
      text-decoration: none;
      padding: .35rem .9rem;
      border-radius: 8px;
      transition: background .2s, color .2s;
    }
    .nav-links a:hover { background: var(--warm); color: var(--ink); }
    .nav-links a.active {
      background: var(--orange);
      color: #fff;
    }

    /* ─── GAME WRAPPER ─── */
    .game-page {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem 3rem;
      gap: 2rem;
    }

    .game-title {
      font-family: 'Fredoka One', cursive;
      font-size: clamp(1.6rem, 4vw, 2.4rem);
      color: var(--ink);
      text-align: center;
    }
    .game-title span { color: var(--orange); }

    /* ─── CARD ─── */
    .game-card {
      background: #FEFAF4;
      border: 3px solid var(--warm);
      border-radius: 24px;
      box-shadow: 0 8px 32px rgba(61,44,30,.10);
      padding: 2.5rem 2.5rem 2rem;
      max-width: 580px;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.8rem;
    }

    .question-label {
      font-family: 'Fredoka One', cursive;
      font-size: 1.25rem;
      color: var(--brown);
      letter-spacing: .02em;
    }

    /* ─── ITEMS STAGE ─── */
    .items-stage {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      gap: 1rem;
      min-height: 130px;
      padding: .5rem;
    }
    .charm-item {
      width: 100px;
      height: 100px;
      object-fit: contain;
      filter: drop-shadow(2px 3px 4px rgba(0,0,0,.18));
      animation: popIn .35s cubic-bezier(.34,1.56,.64,1) both;
    }
    @keyframes popIn {
      from { transform: scale(0) rotate(-10deg); opacity: 0; }
      to   { transform: scale(1) rotate(0deg);   opacity: 1; }
    }
    .charm-item:nth-child(2) { animation-delay: .07s; }
    .charm-item:nth-child(3) { animation-delay: .14s; }
    .charm-item:nth-child(4) { animation-delay: .21s; }
    .charm-item:nth-child(5) { animation-delay: .28s; }

    /* ─── FEEDBACK ─── */
    .feedback {
      font-family: 'Fredoka One', cursive;
      font-size: 1.9rem;
      min-height: 2.4rem;
      text-align: center;
      transition: all .3s;
    }
    .feedback.correct { color: var(--sage); }
    .feedback.wrong   { color: var(--coral); }

    /* ─── ANSWER CHOICES ─── */
    .choices {
      display: flex;
      gap: 1.2rem;
      justify-content: center;
      flex-wrap: wrap;
    }
    .choice-btn {
      width: 120px;
      height: 120px;
      border: 3.5px solid var(--warm);
      border-radius: 20px;
      background: var(--cream);
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: transform .15s, box-shadow .15s, border-color .2s;
      box-shadow: 0 4px 0 var(--warm);
      padding: .4rem;
      position: relative;
      overflow: visible;
    }
    .choice-btn:hover:not(:disabled) {
      transform: translateY(-4px);
      box-shadow: 0 8px 0 var(--warm);
      border-color: var(--orange);
    }
    .choice-btn:active:not(:disabled) {
      transform: translateY(2px);
      box-shadow: 0 2px 0 var(--warm);
    }
    .choice-btn img {
      width: 80px;
      height: 80px;
      object-fit: contain;
    }
    .choice-btn .num-label {
      font-family: 'Fredoka One', cursive;
      font-size: 1.5rem;
      color: var(--ink);
      line-height: 1;
    }
    .choice-btn.correct-ans {
      border-color: var(--sage);
      background: #E8F7EE;
      animation: correctPop .5s cubic-bezier(.34,1.56,.64,1);
    }
    .choice-btn.wrong-ans {
      border-color: var(--coral);
      background: #FDE8E8;
      animation: shake .4s ease;
    }
    @keyframes correctPop {
      0%   { transform: scale(1); }
      40%  { transform: scale(1.18) rotate(5deg); }
      70%  { transform: scale(.95) rotate(-3deg); }
      100% { transform: scale(1) rotate(0); }
    }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%      { transform: translateX(-8px); }
      40%      { transform: translateX(8px); }
      60%      { transform: translateX(-6px); }
      80%      { transform: translateX(6px); }
    }
    .choice-btn:disabled { cursor: default; }

    /* ─── BUTTONS ─── */
    .btn-row { display: flex; gap: 1rem; justify-content: center; }
    .new-game-btn {
      font-family: 'Fredoka One', cursive;
      font-size: 1.2rem;
      background: var(--orange);
      color: #fff;
      border: none;
      border-radius: 14px;
      padding: .75rem 2.2rem;
      cursor: pointer;
      box-shadow: 0 4px 0 #b85e28;
      transition: transform .15s, box-shadow .15s;
    }
    .new-game-btn:hover { transform: translateY(-3px); box-shadow: 0 7px 0 #b85e28; }
    .new-game-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #b85e28; }

    /* ─── STARS ─── */
    .stars { font-size: 1.5rem; letter-spacing: .2rem; min-height: 1.8rem; }

    /* ─── SCORE ─── */
    .score-bar {
      display: flex;
      gap: 2rem;
      font-family: 'Fredoka One', cursive;
      font-size: 1.1rem;
      color: var(--brown);
    }
    .score-bar span { color: var(--ink); }

    /* ─── CONFETTI ─── */
    .confetti-wrap {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: 999;
      overflow: hidden;
    }
    .confetti-dot {
      position: absolute;
      width: 10px; height: 10px;
      border-radius: 50%;
      animation: fall linear forwards;
    }
    @keyframes fall {
      0%   { transform: translateY(-20px) rotate(0deg); opacity: 1; }
      100% { transform: translateY(105vh) rotate(720deg); opacity: 0; }
    }

    @media (max-width: 520px) {
      .game-card { padding: 1.5rem 1rem; }
      .choice-btn { width: 95px; height: 95px; }
      .choice-btn img { width: 62px; height: 62px; }
      .charm-item { width: 78px; height: 78px; }
      nav { padding: 0 1rem; }
    }
  </style>
</head>
<body>

<!-- ─── NAV ─── -->
<nav>
  <div class="logo">
    <a href="index.html"><img src="assets/logo.png" alt="Numzi" height="110" style="display:block;filter:drop-shadow(1px 1px 2px rgba(0,0,0,.1))"/></a>
  </div>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="game.html" class="active">🎮 Games</a>
  </div>
</nav>

<!-- ─── CONFETTI CONTAINER ─── -->
<div class="confetti-wrap" id="confettiWrap"></div>

<!-- ─── GAME ─── -->
<main class="game-page">
  <div class="game-title">How many <span>charms</span> do you see? 🔢</div>

  <div class="score-bar">
    <div>⭐ Score: <span id="scoreVal">0</span></div>
    <div>🎯 Round: <span id="roundVal">1</span></div>
  </div>

  <div class="game-card">
    <div class="question-label">Count the charms!</div>

    <!-- Items to count -->
    <div class="items-stage" id="itemsStage"></div>

    <!-- Feedback text -->
    <div class="feedback" id="feedback"></div>

    <!-- Answer choices -->
    <div class="choices" id="choices"></div>

    <!-- Stars -->
    <div class="stars" id="stars"></div>

    <!-- New Game button -->
    <div class="btn-row">
      <button class="new-game-btn" id="nextBtn" onclick="nextRound()">Next ➜</button>
    </div>
  </div>
</main>

<script>
  const CHARMS = [
    { src: 'assets/charms/cat.png',         name: 'cat' },
    { src: 'assets/charms/ladybug.png',     name: 'ladybug' },
    { src: 'assets/charms/sun.png',         name: 'sun' },
    { src: 'assets/charms/flower.png',      name: 'flower' },
    { src: 'assets/charms/mushroom.png',    name: 'mushroom' },
    { src: 'assets/charms/rainbow.png',     name: 'rainbow' },
    { src: 'assets/charms/frog.png',        name: 'frog' },
    { src: 'assets/charms/penguin.png',     name: 'penguin' },
    { src: 'assets/charms/egg.png',         name: 'egg' },
    { src: 'assets/charms/melon.png',       name: 'melon' },
    { src: 'assets/charms/gingerbread.png', name: 'gingerbread' },
  ];

  // Number charm images for 1–4; text fallback for 5+
  const NUM_IMGS = {
    1: 'assets/one.png',
    2: 'assets/two.png',
    3: 'assets/three.png',
    4: 'assets/four.png',
  };

  const MAX_COUNT = 5; // range 1–5
  const CONFETTI_COLORS = ['#E8844A','#F5C842','#7BBF8E','#7BBFDB','#B59FD6','#E87B7B'];

  let correctAnswer = 1;
  let score = 0;
  let round = 1;
  let answered = false;

  function rand(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
  function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

  function speak(text) {
    if (!window.speechSynthesis) return;
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.rate  = 0.88;
    u.pitch = 1.25;
    u.volume = 1;
    window.speechSynthesis.speak(u);
  }

  function buildRound() {
    answered = false;
    document.getElementById('feedback').textContent = '';
    document.getElementById('feedback').className = 'feedback';
    document.getElementById('stars').textContent = '';
    document.getElementById('nextBtn').textContent = 'Skip ➜';

    // Pick charm & count
    const charm = pick(CHARMS);
    correctAnswer = rand(1, MAX_COUNT);

    // Render items
    const stage = document.getElementById('itemsStage');
    stage.innerHTML = '';
    for (let i = 0; i < correctAnswer; i++) {
      const img = document.createElement('img');
      img.src = charm.src;
      img.alt = charm.name;
      img.className = 'charm-item';
      img.style.animationDelay = (i * 0.08) + 's';
      stage.appendChild(img);
    }

    // Build 3 unique answer options
    const options = new Set([correctAnswer]);
    while (options.size < 3) {
      let n = rand(1, MAX_COUNT);
      if (n !== correctAnswer) options.add(n);
    }
    const shuffled = [...options].sort(() => Math.random() - .5);

    const choicesEl = document.getElementById('choices');
    choicesEl.innerHTML = '';
    shuffled.forEach(num => {
      const btn = document.createElement('button');
      btn.className = 'choice-btn';
      btn.dataset.val = num;
      btn.onclick = () => handleAnswer(num, btn);

      if (NUM_IMGS[num]) {
        const img = document.createElement('img');
        img.src = NUM_IMGS[num];
        img.alt = num;
        btn.appendChild(img);
      } else {
        const label = document.createElement('div');
        label.className = 'num-label';
        label.textContent = num;
        btn.appendChild(label);
      }
      choicesEl.appendChild(btn);
    });
  }

  function handleAnswer(val, btn) {
    if (answered) return;
    answered = true;

    const allBtns = document.querySelectorAll('.choice-btn');
    allBtns.forEach(b => b.disabled = true);

    if (val === correctAnswer) {
      btn.classList.add('correct-ans');
      score++;
      document.getElementById('scoreVal').textContent = score;
      document.getElementById('feedback').textContent = '🌟 Good Job!';
      document.getElementById('feedback').className = 'feedback correct';
      document.getElementById('stars').textContent = '⭐'.repeat(Math.min(score, 5));
      speak('Good job! You counted ' + correctAnswer + '!');
      launchConfetti();
    } else {
      btn.classList.add('wrong-ans');
      // Highlight correct
      allBtns.forEach(b => {
        if (parseInt(b.dataset.val) === correctAnswer) b.classList.add('correct-ans');
      });
      document.getElementById('feedback').textContent = '💛 Try Again!';
      document.getElementById('feedback').className = 'feedback wrong';
      speak('Try again! The answer was ' + correctAnswer + '.');
    }

    document.getElementById('nextBtn').textContent = 'Next ➜';
    round++;
    document.getElementById('roundVal').textContent = round;
  }

  function nextRound() { buildRound(); }

  function launchConfetti() {
    const wrap = document.getElementById('confettiWrap');
    for (let i = 0; i < 55; i++) {
      const dot = document.createElement('div');
      dot.className = 'confetti-dot';
      dot.style.left = rand(0, 100) + 'vw';
      dot.style.background = pick(CONFETTI_COLORS);
      dot.style.width = rand(7, 14) + 'px';
      dot.style.height = rand(7, 14) + 'px';
      dot.style.borderRadius = Math.random() > .5 ? '50%' : '3px';
      const dur = rand(900, 1600);
      dot.style.animationDuration = dur + 'ms';
      dot.style.animationDelay = rand(0, 300) + 'ms';
      wrap.appendChild(dot);
      setTimeout(() => dot.remove(), dur + 400);
    }
  }

  // Kick off first round
  buildRound();
</script>

</body>
</html>
